<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" shape-rendering="crispEdges" preserveAspectRatio="none" width="20" height="20">
  <!-- Top edge (rounded corners) -->
  <rect x="1" y="0" width="18" height="1" fill="#c04079"/>

  <!-- Row 1 -->
  <rect x="0" y="1" width="1" height="1" fill="#c04079"/>
  <rect x="1" y="1" width="18" height="1" fill="#ff6fa8"/>
  <rect x="19" y="1" width="1" height="1" fill="#c04079"/>

  <!-- Middle rows -->
  <rect x="0" y="2" width="1" height="16" fill="#c04079"/>
  <rect x="1" y="2" width="1" height="16" fill="#ff6fa8"/>
  <rect x="18" y="2" width="1" height="16" fill="#ff6fa8"/>
  <rect x="19" y="2" width="1" height="16" fill="#c04079"/>

  <!-- Interior (faint pink tint) -->
  <rect x="2" y="2" width="16" height="16" fill="#fff7fb"/>
  <!-- Highlights -->
  <rect x="2" y="2" width="16" height="1" fill="#ffffff"/>
  <rect x="2" y="2" width="1" height="16" fill="#ffffff"/>
  <!-- Bottom-right soft shade -->
  <rect x="2" y="17" width="16" height="1" fill="#ffc7dd"/>
  <rect x="17" y="2" width="1" height="16" fill="#ffc7dd"/>

  <!-- Row 18 -->
  <rect x="0" y="18" width="1" height="1" fill="#c04079"/>
  <rect x="1" y="18" width="18" height="1" fill="#ff6fa8"/>
  <rect x="19" y="18" width="1" height="1" fill="#c04079"/>

  <!-- Bottom edge -->
  <rect x="1" y="19" width="18" height="1" fill="#c04079"/>
</svg>
